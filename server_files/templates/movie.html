<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Flask App</title>
</head>
<body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">Welcome, {{ message }}!</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h4> Movies here... </h4>
</body>
</html>
